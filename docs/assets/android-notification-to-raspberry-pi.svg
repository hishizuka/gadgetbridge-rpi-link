<svg xmlns="http://www.w3.org/2000/svg" width="960" height="424" viewBox="0 0 960 424" role="img" aria-labelledby="title desc">
  <title id="title">Android notification text forwarded to a Raspberry Pi TFT display</title>
  <desc id="desc">Diagram showing notification text on a modern Android phone forwarded through Gadgetbridge over BLE UART to a small TFT display attached to a Raspberry Pi.</desc>
  <!--
    The Android robot is reproduced or modified from work created and shared by
    Google and used according to terms described in the Creative Commons 3.0
    Attribution License. Raspberry Pi is a trademark of Raspberry Pi Ltd; the
    Raspberry Pi logo is used here to refer to Raspberry Pi hardware.
  -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8f0fe"/>
      <stop offset="1" stop-color="#f6f9ff"/>
    </linearGradient>
  </defs>

  <rect width="960" height="424" rx="24" fill="#f8fafc"/>

