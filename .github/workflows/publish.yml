name: Publish to PyPI

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build:
    name: Build and test distributions
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: >-
          python -c
          'import os, tomllib;
          version = tomllib.load(open("pyproject.toml", "rb"))["project"]["version"];
          tag = os.environ["RELEASE_TAG"];
          assert tag == f"v{version}",
          f"release tag {tag!r} must match package version {version!r}"'

      - name: Install test and build dependencies
        run: python -m pip install --upgrade build pytest

      - name: Install package
        run: python -m pip install .

      - name: Run tests
        run: python -m pytest

      - name: Build wheel and source distribution
        run: python -m build

      - name: Store distributions
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish distributions to PyPI
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gadgetbridge-rpi-link
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
