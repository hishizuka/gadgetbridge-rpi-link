    <text x="44" y="27" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#1f2937">Raspberry Pi</text>
  </g>

  <!-- Modern Android phone: thin bezel, punch-hole camera, gesture bar -->
  <g transform="translate(90 72)" filter="url(#shadow)">
    <rect x="171" y="88" width="3.5" height="36" rx="1.75" fill="#33383f"/>
    <rect x="171" y="134" width="3.5" height="24" rx="1.75" fill="#33383f"/>
    <rect x="0" y="0" width="172" height="300" rx="26" fill="#16181d" stroke="#2f333a" stroke-width="1"/>
    <rect x="7" y="7" width="158" height="286" rx="20" fill="url(#screen)"/>
    <circle cx="86" cy="20" r="4" fill="#0b0e13"/>
    <text x="22" y="28" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#475569">3:14</text>
    <path d="M 124 26 l 8 0 0 -7 z" fill="#475569"/>
    <rect x="137" y="19" width="13" height="7" rx="2" fill="none" stroke="#475569"/>
    <rect x="138.5" y="20.5" width="8" height="4" fill="#475569"/>
    <!-- Notification card -->
    <rect x="14" y="46" width="144" height="76" rx="14" fill="#ffffff" stroke="#dbe4f0"/>
    <circle cx="34" cy="84" r="12" fill="#22c55e"/>
    <rect x="27" y="77.5" width="14" height="10" rx="4" fill="#ffffff"/>
    <path d="M 31 87 l -3 5 6 -2.7 z" fill="#ffffff"/>
    <text x="54" y="79" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Message</text>
    <text x="54" y="106" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#334155">Hello World</text>
    <!-- Second, faded notification -->
    <g opacity="0.65">
      <rect x="14" y="132" width="144" height="46" rx="13" fill="#ffffff" stroke="#dbe4f0"/>
      <circle cx="34" cy="155" r="10" fill="#bfdbfe"/>
      <rect x="52" y="144" width="72" height="8" rx="4" fill="#dbe6f3"/>
      <rect x="52" y="159" width="48" height="8" rx="4" fill="#e8eef7"/>
    </g>
    <rect x="62" y="282" width="48" height="4" rx="2" fill="#0f172a" opacity="0.3"/>
  </g>

  <!-- Gadgetbridge BLE link: packet above, short solid arrow with Bluetooth badge -->
  <g transform="translate(0 -36)">
    <text x="456" y="114" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#334155">Gadgetbridge</text>
    <rect x="296" y="126" width="320" height="110" rx="12" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="456" y="160" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700" fill="#1e3a8a">GB({"t":"notify",</text>
    <text x="456" y="190" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700" fill="#1e3a8a">"title":"Message",</text>
    <text x="456" y="220" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700" fill="#1e3a8a">"body":"Hello World"})</text>
    <line x1="316" y1="258" x2="596" y2="258" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <circle cx="456" cy="258" r="14" fill="#2563eb"/>
    <path d="M 456 249.5 L 456 266.5 M 456 249.5 L 461.5 254 L 450.5 262 M 456 266.5 L 461.5 262 L 450.5 254" fill="none" stroke="#ffffff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Small TFT display module on a PCB, no stand -->
  <g transform="translate(650 131)" filter="url(#shadow)">
    <rect x="0" y="0" width="232" height="182" rx="10" fill="#166534" stroke="#14532d"/>
    <circle cx="14" cy="14" r="5" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="218" cy="14" r="5" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="14" cy="168" r="5" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="218" cy="168" r="5" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <!-- GPIO header strip -->
    <rect x="46" y="5" width="140" height="11" rx="2" fill="#0a0a0a"/>
    <g fill="#eab308">
      <rect x="52" y="8" width="5" height="5"/>
      <rect x="63" y="8" width="5" height="5"/>
      <rect x="74" y="8" width="5" height="5"/>
      <rect x="85" y="8" width="5" height="5"/>
      <rect x="96" y="8" width="5" height="5"/>
      <rect x="107" y="8" width="5" height="5"/>
      <rect x="118" y="8" width="5" height="5"/>
      <rect x="129" y="8" width="5" height="5"/>
      <rect x="140" y="8" width="5" height="5"/>
      <rect x="151" y="8" width="5" height="5"/>
      <rect x="162" y="8" width="5" height="5"/>
      <rect x="173" y="8" width="5" height="5"/>
    </g>
    <rect x="16" y="26" width="200" height="140" rx="6" fill="#0f172a"/>
    <rect x="24" y="34" width="184" height="124" rx="3" fill="url(#screen)"/>
    <!-- Rendered notification text (host app draws text only) -->
    <rect x="34" y="56" width="164" height="80" rx="12" fill="#ffffff" stroke="#dbe4f0"/>
    <text x="50" y="90" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Message</text>
    <text x="50" y="120" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">Hello World</text>
  </g>

  <text x="480" y="401" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#94a3b8">The Android robot is reproduced or modified from work created and shared by Google and used according to terms described in the Creative Commons 3.0 Attribution License.</text>
